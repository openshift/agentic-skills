# update-advisor skill eval test cases
#
# These test cases send real CVO proposal requests to the agent and verify
# the upgrade decision (recommend/caution/block/escalate) based on the
# readiness data. Each case embeds a complete readiness JSON matching the
# exact format CVO produces.
#
# Decision matrix (from SKILL.md):
#   0 blockers, 0 warnings → recommend
#   0 blockers, 1+ warnings → caution
#   1+ blockers, any → block
#   Unable to assess → escalate

# Test 1: Healthy cluster — all checks pass, no issues.
# Expected decision: recommend
- name: advisor_healthy_cluster_recommend
  query: |
    Current version: OCP 4.21.5
    Target version: OCP 4.21.16
    Channel: stable-4.21
    Update type: Patch
    Update path: Recommended

